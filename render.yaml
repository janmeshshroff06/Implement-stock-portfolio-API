services:
  - type: web
    name: stock-portfolio-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    preDeployCommand: npx prisma migrate deploy && npx prisma db seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: stock-portfolio-db
          property: connectionString

databases:
  - name: stock-portfolio-db
    plan: free
